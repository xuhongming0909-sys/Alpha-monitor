# Alpha Monitor config contract
# This file is the single source of truth for long-lived business config.
# UI-edited runtime data should stay in runtime JSON state files, not here.

app:
  # App runtime defaults
  name: "Alpha Monitor"
  environment: "development"
  host: "0.0.0.0"
  port: 5000
  scheduler_tick_interval_ms: 60000
  shutdown_grace_timeout_ms: 5000
  python_exec_timeout_ms: 60000
  python_exec_max_buffer_mb: 50
  trust_proxy: false
  server_base_url: "http://127.0.0.1:5000"
  healthcheck_path: "/api/health"
  timezone: "Asia/Shanghai"
  env_file: ".env"
  python_bin: "python3"
  python_bin_candidates:
    - "python3"
    - "python"

deployment:
  # Public deployment contract for cloud-server runtime
  public_base_url: "${PUBLIC_BASE_URL}"
  reverse_proxy:
    enabled: false
    type: "none"
  systemd:
    service_name: "alpha-monitor"
  healthcheck:
    public_path: "/api/health"

storage:
  # Shared storage and profile rules
  data_root_dir: "./runtime_data"
  shared_data_dir: "./runtime_data/shared"
  runtime_profile_dir: "./runtime_data/profiles"
  db_profile: "shared"
  history_incremental_update: true
  replace_full_database: false
  runtime_files:
    market_refresh_state: "market_refresh_state.json"
    arbitrage_monitors: "custom_monitors.json"
    dividend_portfolio: "dividend_portfolio.json"
    merger_company_reports: "merger_company_reports.json"
    push_config: "push_config.json"
    push_runtime_state: "push_runtime_state.json"
    event_arbitrage_cache: "event_arbitrage_cache.json"
    cb_rights_issue_state: "cb_rights_issue_state.json"
    cb_rights_issue_push_config: "cb_rights_issue_push_config.json"
    cb_rights_issue_push_runtime: "cb_rights_issue_push_runtime.json"
    lof_arbitrage_state: "lof_arbitrage_state.json"
    lof_arbitrage_push_config: "lof_arbitrage_push_config.json"
    lof_arbitrage_push_runtime: "lof_arbitrage_push_runtime.json"

logging:
  # Minimal logging defaults
  level: "info"
  console_enabled: true

bus:
  # The Bus = normalized payload contract between fetch plugins and strategy plugins
  schema_version: "v1"
  timezone: "Asia/Shanghai"
  require_normalized_payload: true
  allow_raw_source_snapshot: true
  normalized_record_required_fields:
    - "plugin"
    - "market"
    - "symbol"
    - "name"
    - "event_type"
    - "quote_time"
    - "metrics"
    - "raw"
    - "status"

plugins:
  # Plugin isolation rules
  enforce_isolation: true
  only_allow_shared_and_bus_imports: true
  zero_side_effect_notification_style: true
  data_fetch:
    ah_premium:
      enabled: true
      folder: "data_fetch/ah_premium"
    ab_premium:
      enabled: true
      folder: "data_fetch/ab_premium"
    exchange_rate:
      enabled: true
      folder: "data_fetch/exchange_rate"
    convertible_bond:
      enabled: true
      folder: "data_fetch/convertible_bond"
    merger:
      enabled: true
      folder: "data_fetch/merger"
    event_arbitrage:
      enabled: true
      folder: "data_fetch/event_arbitrage"
    subscription:
      enabled: true
      folder: "data_fetch/subscription"
    dividend:
      enabled: true
      folder: "data_fetch/dividend"
    custom_monitor:
      enabled: true
      folder: "data_fetch/custom_monitor"
    cb_rights_issue:
      enabled: true
      folder: "data_fetch/cb_rights_issue"
    lof_arbitrage:
      enabled: true
      folder: "data_fetch/lof_arbitrage"
  strategy:
    ah_premium:
      enabled: true
      folder: "strategy/ah_premium"
    ab_premium:
      enabled: true
      folder: "strategy/ab_premium"
    convertible_bond:
      enabled: true
      folder: "strategy/convertible_bond"
    merger:
      enabled: true
      folder: "strategy/merger"
    event_arbitrage:
      enabled: true
      folder: "strategy/event_arbitrage"
    subscription:
      enabled: true
      folder: "strategy/subscription"
    dividend:
      enabled: true
      folder: "strategy/dividend"
    custom_monitor:
      enabled: true
      folder: "strategy/custom_monitor"
    cb_rights_issue:
      enabled: true
      folder: "strategy/cb_rights_issue"
    lof_arbitrage:
      enabled: true
      folder: "strategy/lof_arbitrage"

data_fetch:
  # Fetch layer config only controls upstream access and normalization cadence
  realtime:
    price_refresh_interval_ms: 300000
    exchange_rate_refresh_interval_ms: 300000
  daily_sync:
    cutoff_time: "16:10"
  plugins:
    ah_premium:
      intraday: true
      refresh_interval_ms: 300000
      daily_incremental_sync: true
      force_pair_sync_on_daily_job: true
    ab_premium:
      intraday: true
      refresh_interval_ms: 300000
      daily_incremental_sync: true
      force_pair_sync_on_daily_job: true
    exchange_rate:
      intraday: true
      refresh_interval_ms: 300000
      daily_incremental_sync: false
      source: "tencent"
    subscription:
      intraday: true
      refresh_interval_ms: 900000
      daily_incremental_sync: true
      history_retention_days: 1095
      supported_kinds:
        - "ipo"
        - "bond"
    dividend:
      intraday: false
      refresh_interval_ms: 900000
      daily_incremental_sync: true
    merger:
      intraday: false
      refresh_time: "00:00"
      daily_incremental_sync: false
      announcement_lookback_days: 90
      keyword_sets:
        search:
          - "tender_offer"
          - "absorption_merger"
          - "agreement_acquisition"
          - "major_asset_restructuring"
          - "privatization"
        core:
          - "tender_offer_report"
          - "tender_offer_notice"
          - "acquisition_report"
          - "merger_report"
          - "restructuring_report"
    event_arbitrage:
      intraday: true
      refresh_interval_ms: 300000
      daily_incremental_sync: false
      timeout_ms: 30000
      cache_ttl_ms: 300000
      sources:
        hk_private:
          enabled: true
        cn_private:
          enabled: true
        a_event:
          enabled: true
        rights_issue:
          enabled: false
    convertible_bond:
      intraday: true
      refresh_interval_ms: 300000
      daily_incremental_sync: true
      sync_stock_history_before_strategy: true
      trading_days_per_year: 252
      volatility_windows:
        - 20
        - 60
        - 120
      atr_window: 20
      turnover_avg_windows:
        - 5
        - 20
      primary_vol_window: 60
      history_lookback_days: 420
      stock_history_retention_rows: 160
      max_vol_sync_workers: 8
      max_financial_workers: 10
      inline_history_hydrate_limit: 24
      jisilu_cookie: "${JISILU_COOKIE}"
    custom_monitor:
      intraday: true
      refresh_interval_ms: 300000
      data_source: "runtime_state"
    cb_rights_issue:
      intraday: true
      refresh_interval_ms: 900000
      daily_incremental_sync: true
      sync_stock_history_before_strategy: true
      request_timeout_ms: 20000
      history_lookback_days: 420
      stock_history_retention_rows: 90
      max_history_sync_workers: 8
      inline_history_hydrate_limit: 12
      source_page_url: "https://www.jisilu.cn/web/data/cb/pre"
      source_api_url: "https://www.jisilu.cn/webapi/cb/pre/"
      source_title: "集思录可转债预案"
      source_referer: "https://www.jisilu.cn/web/data/cb/pre"
    lof_arbitrage:
      intraday: true
      refresh_interval_ms: 300000
      daily_incremental_sync: false
      default_group: "europe_us"
      source_page_urls:
        index: "https://www.jisilu.cn/data/lof/#index"
        europe_us: "https://www.jisilu.cn/data/qdii/#qdiie"
        asia: "https://www.jisilu.cn/data/qdii/#qdiia"
      source_api_urls:
        index: "https://www.jisilu.cn/data/lof/index_lof_list/"
        europe_us: "https://www.jisilu.cn/data/qdii/qdii_list/E"
        asia: "https://www.jisilu.cn/data/qdii/qdii_list/A"
      source_referer: "https://www.jisilu.cn/"
      request_timeout_ms: 20000
      jisilu_cookie: "${JISILU_COOKIE}"
      firecrawl_enabled: false
      firecrawl_api_url: "${FIRECRAWL_API_URL}"
      firecrawl_api_key: "${FIRECRAWL_API_KEY}"
      firecrawl_timeout_ms: 20000
      external_market_api:
        enabled: true
        provider: "stooq"
        request_timeout_ms: 12000
        current_quote_url: "https://stooq.com/q/l/"
        history_quote_url: "https://stooq.com/q/d/l/"
        index_symbol_map:
          cal_index_id:
            "SPX.GI": "^SPX"
            "NDX.GI": "^NDQ"
            "DJI.GI": "^DJI"
            "IXIC.GI": "^NDQ"
            "AGG": "AGG.US"
          index_name:
            "恒生指数": "^HSI"
        fx_symbol_map:
          "USD": "usdcny"
          "HKD": "hkdcny"
          "EUR": "eurcny"
          "GBP": "gbpcny"
          "AUD": "audcny"
          "SGD": "sgdcny"
          "CAD": "cadcny"
      limited_apply_cap_amount: 100000
      limited_premium_rate_threshold: 1
      unlimited_abs_premium_rate_threshold: 5
      min_turnover_wan: 100

strategy:
  # Strategy layer reads only normalized records plus config
  ah_premium:
    ranking_metric: "premium_rate"
    push_top_n: 3
  ab_premium:
    ranking_metric: "premium_rate"
    push_top_n: 3
  convertible_bond:
    push_categories:
      - "double_low"
      - "theoretical_yield"
      - "putback_arbitrage"
      - "limit_up_arbitrage"
      - "conversion_arbitrage"
      - "delisting_game"
    discount_strategy:
      buy_threshold: 2
      sell_threshold: 0.5
      monitor_interval_minutes: 10
      monitor_session_times:
        - "09:30"
        - "09:40"
        - "09:50"
        - "10:00"
        - "10:10"
        - "10:20"
        - "10:30"
        - "10:40"
        - "10:50"
        - "11:00"
        - "11:10"
        - "11:20"
        - "11:30"
        - "13:00"
        - "13:10"
        - "13:20"
        - "13:30"
        - "13:40"
        - "13:50"
        - "14:00"
        - "14:10"
        - "14:20"
        - "14:30"
        - "14:40"
        - "14:50"
      atr_anchor_points:
        - { x: 0, y: 0 }
        - { x: 0.25, y: 0.5 }
        - { x: 0.5, y: 0.8 }
        - { x: 1, y: 1 }
      sell_pressure_anchor_points:
        - { x: 0.5, y: 1 }
        - { x: 1, y: 0.8 }
        - { x: 5, y: 0.5 }
        - { x: 20, y: 0 }
      board_coefficients:
        科创板: 1
        创业板: 0.85
        主板: 0.8
  merger:
    same_day_only: true
    ai_provider: "deepseek"
    prompt_template_code: "MERGER_DEAL_OVERVIEW_V1"
    report_max_chars: 500
    deepseek_api_key: "${DEEPSEEK_API_KEY}"
    deepseek_base_url: "https://api.deepseek.com"
  event_arbitrage:
    primary_source: "jisilu"
    announcement_role: "auxiliary"
    match_by: "sec_code_only"
    match_lookback_days: 365
    enable_push: false
    treat_limited_apply_as_watch_only: true
  dividend:
    trigger_rule: "record_date_same_day"
  subscription:
    scope:
      - "a_share_ipo"
      - "convertible_bond"
    push_events:
      - "subscribe"
      - "lottery_check"
      - "payment"
      - "listing"
  custom_monitor:
    support_stock_plus_cash: true
    support_pure_cash_mode: true
  cb_rights_issue:
    min_expected_return_rate: 6
    target_bond_lots: 10
    lot_size_shares: 100
    shanghai_ratio_factor: 0.6
    moving_average_window: 20
    volatility_window: 60
    option_term_years: 6
    option_model: "black_scholes"
    eligible_progress_keywords:
      - "上市委通过"
      - "同意注册"
      - "注册生效"
  lof_arbitrage:
    default_group: "europe_us"
    ranking_metric: "premium_rate"
    limited_apply_cap_amount: 100000
    limited_premium_rate_threshold: 1
    unlimited_abs_premium_rate_threshold: 5
    min_turnover_wan: 100

presentation:
  # Presentation layer controls API shaping and dashboard visibility
  api_prefix: "/api"
  dashboard_entry: "./presentation/templates/dashboard_template.html"
  show_empty_modules: true
  show_failure_state: true
  dashboard_auto_refresh:
    enabled: true
    interval_ms: 60000
    mode: "status"
    current_tab_only: true
    reload_data_on_cache_change: true
  dashboard_table_ui:
    desktop_font_px: 16
    desktop_header_font_px: 15
    desktop_line_height: 1.42
    desktop_cell_padding_y: 7
    desktop_cell_padding_x: 8
    tablet_font_px: 15
    min_width_by_kind:
      subscription: 1180
      convertible: 2360
      premium: 1440
      monitor: 1320
      dividend: 1100
      merger: 1280
      lof: 1680
  dashboard_module_notes:
    subscription:
      data_sources:
        - "新股与可转债打新日历来自 AkShare 打新接口，抓取结果会同步到本地 sqlite 历史库。"
      formulas:
        - "今日申购 = subscribeDate 等于今天。"
        - "今日中签缴款 = paymentDate 等于今天。"
        - "今日上市 = listingDate 等于今天。"
      strategy_notes:
        - "页面只展示今天发生的打新事件，并按申购 → 缴款 → 上市顺序汇总。"
        - "摇号/中签公告日不再单独展示，也不再冒充缴款日。"
    cbArb:
      data_sources:
        - "转债实时行情来自新浪转债行情与东方财富转债资料；正股历史与部分财务字段来自 AkShare / 东方财富。"
        - "60日波动率依赖本地历史 K 线库与正股历史同步链路。"
      formulas:
        - "转股价值 = 100 ÷ 转股价 × 正股现价。"
        - "转股溢价率 = (转债现价 ÷ 转股价值 - 1) × 100%。"
        - "双低 = 转债现价 + 转股溢价率。"
        - "理论价值(参考) = 纯债价值 + 期权理论价值。"
      strategy_notes:
        - "主表优先看双低、转股溢价率、波动率、纯债价值与理论参考值。"
        - "理论价值相关字段只作参考，不作为保证成交或收益的承诺。"
    ah:
      data_sources:
        - "A/H 实时行情与汇率来自腾讯行情；配对池来自动态配对表；历史分位来自 premium_history.db。"
      formulas:
        - "H股人民币价 = H股现价 × HKD/CNY。"
        - "AH 溢价率 = (H股人民币价 ÷ A股现价 - 1) × 100%。"
        - "近三年分位基于当前可用历史溢价样本的经验分位。"
      strategy_notes:
        - "页面默认按溢价率排序，同时保留近三年分位与样本区间，方便区分短期高溢价和长期极值。"
    ab:
      data_sources:
        - "A/B 实时行情与 USD/HKD 汇率来自腾讯行情；配对池来自动态配对表；历史分位来自 premium_history.db。"
      formulas:
        - "B股人民币价 = B股现价 × 对应汇率。"
        - "AB 溢价率 = (B股人民币价 ÷ A股现价 - 1) × 100%。"
        - "近三年分位基于当前可用历史溢价样本的经验分位。"
      strategy_notes:
        - "顶部摘要固定锚定溢价率前三/倒数前三，不随表格临时排序列改变。"
    monitor:
      data_sources:
        - "监控项目来自运行态 JSON 配置；股票检索与实时价格来自统一市场搜索/行情接口。"
      formulas:
        - "股票腿理论对价 = 收购方股价 × 换股比例 × 安全系数 + 现金对价。"
        - "股票腿收益率 = (股票腿理论对价 - 目标现价) ÷ 目标现价 × 100%。"
        - "现金腿收益率 = (现金选择权价格 - 目标现价) ÷ 目标现价 × 100%。"
      strategy_notes:
        - "页面按最优收益率排序，默认显示每个监控项的明细说明，并支持当前页内新增/编辑。"
    dividend:
      data_sources:
        - "分红方案来自 AkShare / 巨潮口径；实时价格来自腾讯行情。"
        - "观察名单来自手动分红组合与已有监控股票的合并去重结果。"
      formulas:
        - "股息率 = 每股分红 ÷ 当前股价 × 100%。"
      strategy_notes:
        - "页面优先提醒今日登记日，再展示完整观察名单。"
        - "同一股票若同时存在手动分红组合和监控来源，以手动组合为准。"
    merger:
      data_sources:
        - "事件套利数据来自集思录公开 JSON 接口，并带有运行态缓存回退。"
      formulas:
        - "港股/中概套利空间、A股安全边际折价与现金选择权折价沿用源侧返回字段展示。"
      strategy_notes:
        - "页面统一承接港股套利、中概私有、A股套利与公告池，优先展示当前仍有观察价值的条目。"
        - "若公开源缺失某一子类，页面会保留空态或缓存态说明，不伪造结果。"
    cbRightsIssue:
      data_sources:
        - "固定源使用集思录可转债预案页面及其真实 JSON 接口；正股历史库为本功能独立维护。"
        - "正股实时价格与十年期国债收益率来自统一市场 / AkShare 实时抓取。"
      formulas:
        - "配售所需资金 = 配售10张实际所需股数 × 当前股价。"
        - "配售预期收益 = 单位期权价值 × 期权数量。"
        - "预计收益率 = 配售预期收益 ÷ 配售所需资金。"
      strategy_notes:
        - "只有处于上市委通过、同意注册(注册生效)或已明确申购日，且预计收益率大于 6% 的项目才进入当天监控列表。"
        - "URL 页面给出的转股价按 20 日均值代理处理，行权价取转股价与当前价的较大值。"
        - "60日波动率严格来自本功能独立历史库，若历史不足则不入池。"
        - "页面展示的是配售期权价值估算口径，不代表实际收益保证。"
    lofArb:
      data_sources:
        - "首期固定锚定集思录 LOF / QDII 页面家族；配置了集思录 Cookie 时优先读取完整列表，否则保持游客可见范围。"
        - "IOPV 修正优先复用集思录源字段、腾讯实时指数/汇率与少量统一映射，不为单只基金额外接入碎片化 API。"
      formulas:
        - "溢价率 = (IOPV / 现价 - 1) × 100%。"
        - "指数LOF / QDII亚洲：净值日期为 T-1 时，IOPV = T-1 日净值 × (1 + 指数涨幅) × (今日汇率 / 基准汇率)；净值日期为当日时，IOPV = 当日净值。"
        - "QDII欧美：按最新已发布净值日期对齐锚点；净值为 T-2 时按 T-2 锚点估算，净值为 T-1 时按 T-1 锚点估算，今日指数与今日汇率优先走外部实时 API。"
      strategy_notes:
        - "页面顶部只显示限购监控池和非限购监控池，不再堆放额外状态卡。"
        - "限购池要求存在限购、限额低于 10 万、溢价率大于 1%、成交额大于 100 万，且暂停申购样本不得入池；非限池要求不限购、未暂停申购且溢价率绝对值大于 5%、成交额大于 100 万。"
        - "无法拿到足够真实输入时，行仍然保留，但 IOPV / 溢价率不伪造，直接显示真实计算状态。"
  stock_search:
    default_limit: 10
    max_limit: 100
    timeout_ms: 30000
  dividend:
    default_upcoming_days: 7
    max_upcoming_days: 365
  event_arbitrage:
    default_subtab: "a_event"
    show_disabled_categories: true
    module_name: "事件套利"
  historical_premium:
    default_days: 1825
    max_days: 10000
    timeout_ms: 100000

notification:
  # Long-lived notification defaults; user-edited times remain runtime overrides
  channel: "wecom"
  default_full_push_time: "08:00"
  ui_runtime_overrides_enabled: true
  enabled_modules:
    ahab: true
    subscription: true
    cb_arb: true
    custom_monitor: true
    dividend: true
    event_arbitrage: true
  summary:
    ah_top_n: 2
    ab_top_n: 2
    cb_top_n: 4
    event_arbitrage_top_n: 6
  scheduler:
    enabled: true
    calendar_mode: "daily"
    default_times:
      - "08:00"
      - "20:18"
  cb_rights_issue:
    enabled: true
    trading_days_only: true
    default_times:
      - "08:00"
      - "14:30"
  lof_arbitrage:
    enabled: true
    trading_days_only: true
    default_times:
