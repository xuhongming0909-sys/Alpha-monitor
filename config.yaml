  default_full_push_time: "08:00"
  ui_runtime_overrides_enabled: true
  enabled_modules:
    ahab: true
    subscription: true
    cb_arb: true
    custom_monitor: true
    dividend: true
    event_arbitrage: true
  summary:
    ah_top_n: 2
    ab_top_n: 2
    cb_top_n: 4
    event_arbitrage_top_n: 6
  scheduler:
    enabled: true
    calendar_mode: "daily"
    default_times:
      - "08:00"
      - "20:18"
  cb_rights_issue:
    enabled: true
    trading_days_only: true
    default_times:
      - "08:00"
      - "14:30"
  lof_arbitrage:
    enabled: true
    trading_days_only: true
    default_times:
      - "14:00"
  wecom:
    webhook_url: "${WECOM_WEBHOOK_URL}"
    push_html_url: "${PUSH_HTML_URL}"
    max_markdown_length: 3900


