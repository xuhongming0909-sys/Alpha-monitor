<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha Monitor</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --card: #fffdf8;
        --line: #d8c9b3;
        --text: #2e241a;
        --muted: #6a5742;
        --primary: #b55c2c;
        --primary-dark: #8f461f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(181, 92, 44, 0.14), transparent 30%),
          linear-gradient(180deg, #f8f4ed 0%, var(--bg) 48%, #efe7da 100%);
      }

      .shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: 0 18px 42px rgba(92, 63, 36, 0.08);
      }

      .hero {
        padding: 28px;
      }

      h1,
      h2 {
        margin: 0;
      }

      h1 {
        font-size: 34px;
        line-height: 1.2;
      }

      h2 {
        font-size: 20px;
        margin-bottom: 12px;
      }

      p,
      li {
        color: var(--muted);
        line-height: 1.75;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 14px 0 6px;
        padding: 8px 12px;
        border-radius: 999px;
        background: #fff4ea;
        border: 1px solid #edcfb8;
        color: var(--primary-dark);
        font-weight: 700;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 14px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 700;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--primary-dark);
      }

      .btn-secondary {
        background: #fff5eb;
        color: var(--primary-dark);
        border-color: var(--line);
      }

      .btn[aria-disabled='true'] {
        pointer-events: none;
        opacity: 0.55;
      }

      .panel {
        margin-top: 18px;
        padding: 20px;
      }

      .panel ul {
        margin: 0;
        padding-left: 20px;
      }

      iframe {
        width: 100%;
        min-height: 900px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
      }

      .muted-code {
        font-family: Consolas, "Courier New", monospace;
        background: #f7efe5;
        border: 1px solid #ead8c4;
        border-radius: 10px;
        padding: 2px 8px;
      }

      @media (max-width: 760px) {
        .hero,
        .panel {
          padding: 18px;
        }

        h1 {
          font-size: 28px;
        }

        iframe {
          min-height: 680px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="card hero">
        <h1>Alpha Monitor 页面入口</h1>
        <div class="status" id="service-status">正在检查本地服务状态...</div>
        <p>
          这个入口页支持两种打开方式：如果本地服务已经启动，就直接进入
          <span class="muted-code" data-service-url>待检测</span>；
          如果你只是双击打开 HTML 文件，也能先看到本地预览页。
        </p>
        <p>
          如果服务没有启动，请先执行
          <span class="muted-code">npm run start</span>
          或
          <span class="muted-code">npm run start:stable</span>。
        </p>
        <div class="actions">
          <a class="btn btn-primary" id="service-link" href="#" target="_blank" rel="noreferrer" aria-disabled="true">打开服务版页面</a>
          <a class="btn btn-secondary" id="preview-link" href="./presentation/templates/dashboard_template.html" target="_blank" rel="noreferrer">打开本地预览页</a>
        </div>
      </section>

      <section class="card panel">
        <h2>使用说明</h2>
        <ul>
          <li>正式访问地址：<span class="muted-code" data-service-url>待检测</span></li>
          <li>本地模板文件：<span class="muted-code">presentation/templates/dashboard_template.html</span></li>
          <li id="service-hint">如果模板能打开但没有数据，通常说明前端文件没问题，只是后端服务还没启动。</li>
        </ul>
      </section>

      <section class="card panel">
        <h2>本地预览</h2>
        <iframe id="preview-frame" src="./presentation/templates/dashboard_template.html" title="Alpha Monitor 本地预览"></iframe>
      </section>
    </div>

    <script>
      const statusNode = document.getElementById('service-status');
      const serviceLinkNode = document.getElementById('service-link');
      const previewLinkNode = document.getElementById('preview-link');
      const previewFrameNode = document.getElementById('preview-frame');
      const serviceHintNode = document.getElementById('service-hint');
      const serviceUrlNodes = Array.from(document.querySelectorAll('[data-service-url]'));
      const previewTemplatePath = './presentation/templates/dashboard_template.html';

      function normalizeBaseUrl(value) {
        const text = String(value || '').trim();
        return text ? text.replace(/\/+$/, '') : '';
      }

      function buildPreviewUrl(serviceBaseUrl) {
        const baseUrl = normalizeBaseUrl(serviceBaseUrl);
        if (!baseUrl) return previewTemplatePath;
        return `${previewTemplatePath}?apiBase=${encodeURIComponent(baseUrl)}`;
      }

      function setServiceLink(serviceBaseUrl) {
        if (!serviceLinkNode) return;
        if (!serviceBaseUrl) {
          serviceLinkNode.setAttribute('aria-disabled', 'true');
          serviceLinkNode.setAttribute('href', '#');
          return;
        }
        serviceLinkNode.setAttribute('aria-disabled', 'false');
        serviceLinkNode.setAttribute('href', serviceBaseUrl);
      }

      function applyAccessInfo(accessInfo) {
        const serviceBaseUrl = normalizeBaseUrl(
          accessInfo?.publicBaseUrl || accessInfo?.serverBaseUrl
        );
        const previewUrl = buildPreviewUrl(serviceBaseUrl);
        const visibleServiceUrl = serviceBaseUrl || '以 config.yaml > app.server_base_url 为准';
        serviceUrlNodes.forEach((node) => {
          node.textContent = visibleServiceUrl;
        });
        setServiceLink(serviceBaseUrl);
        if (previewLinkNode) previewLinkNode.href = previewUrl;
        if (previewFrameNode) previewFrameNode.src = previewUrl;
        if (serviceHintNode && !serviceBaseUrl) {
          serviceHintNode.textContent = '当前是本地静态预览，服务地址以 config.yaml > app.server_base_url 和实际启动结果为准。';
        }
        return {
          serviceBaseUrl,
          publicHealthUrl: normalizeBaseUrl(accessInfo?.publicHealthUrl),
        };
      }

      async function loadAccessInfo() {
        if (window.location.protocol === 'file:') {
          return {
            serverBaseUrl: '',
            publicBaseUrl: '',
            publicHealthUrl: '',
            environment: 'file-preview',
          };
        }
        try {
          const response = await fetch('./api/dashboard/access-info', { cache: 'no-store' });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const payload = await response.json();
          return payload?.data || {};
        } catch (_error) {
          const origin = normalizeBaseUrl(window.location.origin);
          return {
            serverBaseUrl: origin,
            publicBaseUrl: origin,
            publicHealthUrl: origin ? `${origin}/api/health` : '',
            environment: 'fallback',
          };
        }
      }

      async function updateServiceStatus() {
        const accessInfo = await loadAccessInfo();
        const applied = applyAccessInfo(accessInfo);
        const healthUrl = applied.publicHealthUrl || (applied.serviceBaseUrl ? `${applied.serviceBaseUrl}/api/health` : '');
        if (!healthUrl) {
          statusNode.textContent = '当前未锁定服务地址，已切换为本地静态预览模式。';
          return;
        }
        try {
          const response = await fetch(healthUrl, { cache: 'no-store' });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          statusNode.textContent = '本地服务已启动，可以直接打开服务版页面。';
        } catch (_error) {
          statusNode.textContent = '服务暂不可达，当前可先使用本地预览页。';
        }
      }

      updateServiceStatus();
    </script>
  </body>
</html>
