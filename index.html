<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha Monitor Cloud Access</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe7;
        --card: #fffdfa;
        --line: #d8ccb9;
        --text: #2c241c;
        --muted: #65584a;
        --accent: #a34d23;
        --accent-dark: #7e3818;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(163, 77, 35, 0.12), transparent 28%),
          linear-gradient(180deg, #f9f6f0 0%, var(--bg) 52%, #ece3d5 100%);
      }

      .shell {
        max-width: 980px;
        margin: 0 auto;
        padding: 28px 16px 48px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: 0 18px 42px rgba(84, 58, 34, 0.08);
      }

      .hero {
        padding: 28px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 34px;
        line-height: 1.18;
      }

      h2 {
        font-size: 20px;
        margin-bottom: 12px;
      }

      .lead {
        margin-top: 14px;
        color: var(--muted);
        line-height: 1.8;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 16px;
        padding: 8px 12px;
        border-radius: 999px;
        background: #fff3e8;
        border: 1px solid #efd6c2;
        color: var(--accent-dark);
        font-weight: 700;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 14px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 700;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--accent-dark);
      }

      .btn-secondary {
        background: #fff7ef;
        color: var(--accent-dark);
        border-color: var(--line);
      }

      .btn[aria-disabled='true'] {
        pointer-events: none;
        opacity: 0.55;
      }

      .panel {
        margin-top: 18px;
        padding: 22px;
      }

      ul {
        margin: 0;
        padding-left: 20px;
        color: var(--muted);
        line-height: 1.8;
      }

      .mono {
        font-family: Consolas, "Courier New", monospace;
        background: #f7efe5;
        border: 1px solid #ead8c4;
        border-radius: 10px;
        padding: 2px 8px;
      }

      @media (max-width: 760px) {
        .hero,
        .panel {
          padding: 18px;
        }

        h1 {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="card hero">
        <h1>Alpha Monitor 云端访问入口</h1>
        <div class="status" id="status-text">正在读取云端访问配置...</div>
        <p class="lead">
          该项目现在只保留云端正式运行形态，不再提供本地预览页、本地常驻守护或本地接入入口。
          正式访问请使用部署后的公网首页与公网健康检查地址。
        </p>
        <div class="actions">
          <a class="btn btn-primary" id="home-link" href="#" target="_blank" rel="noreferrer" aria-disabled="true">打开云端首页</a>
          <a class="btn btn-secondary" id="health-link" href="#" target="_blank" rel="noreferrer" aria-disabled="true">打开云端健康检查</a>
        </div>
      </section>

      <section class="card panel">
        <h2>当前访问信息</h2>
        <ul>
          <li>正式首页：<span class="mono" id="public-home-text">待返回</span></li>
          <li>健康检查：<span class="mono" id="public-health-text">待返回</span></li>
          <li>运行环境：<span class="mono" id="environment-text">待返回</span></li>
        </ul>
      </section>

      <section class="card panel">
        <h2>使用规则</h2>
        <ul>
          <li>正式访问只认云端 `deployment.public_base_url`。</li>
          <li>本地 `npm run dev` 只用于开发验证，不再作为交付入口。</li>
          <li>如果公网地址尚未配置，请先查看 `RUNBOOK.md` 完成云端部署。</li>
        </ul>
      </section>
    </div>

    <script>
      const statusNode = document.getElementById('status-text');
      const homeLinkNode = document.getElementById('home-link');
      const healthLinkNode = document.getElementById('health-link');
      const homeTextNode = document.getElementById('public-home-text');
      const healthTextNode = document.getElementById('public-health-text');
      const environmentTextNode = document.getElementById('environment-text');

      function normalizeBaseUrl(value) {
        const text = String(value || '').trim();
        return text ? text.replace(/\/+$/, '') : '';
      }

      function setLink(node, href) {
        if (!node) return;
        if (!href) {
          node.href = '#';
          node.setAttribute('aria-disabled', 'true');
          return;
        }
        node.href = href;
        node.setAttribute('aria-disabled', 'false');
      }

      async function loadAccessInfo() {
        if (window.location.protocol === 'file:') {
          return {
            publicBaseUrl: '',
            publicHealthUrl: '',
            environment: 'file',
          };
        }

        const response = await fetch('./api/dashboard/access-info', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const payload = await response.json();
        return payload?.data || {};
      }

      async function renderAccessInfo() {
        try {
          const info = await loadAccessInfo();
          const publicBaseUrl = normalizeBaseUrl(info.publicBaseUrl);
          const publicHealthUrl = normalizeBaseUrl(info.publicHealthUrl);
          const environment = String(info.environment || (window.location.protocol === 'file:' ? 'file' : 'unknown'));

          homeTextNode.textContent = publicBaseUrl || '请查看 config.yaml > deployment.public_base_url';
          healthTextNode.textContent = publicHealthUrl || '请先完成云端部署后再访问 /api/health';
          environmentTextNode.textContent = environment;
          setLink(homeLinkNode, publicBaseUrl);
          setLink(healthLinkNode, publicHealthUrl);

          if (publicBaseUrl && publicHealthUrl) {
            statusNode.textContent = '云端访问配置已就绪';
            return;
          }

          if (window.location.protocol === 'file:') {
            statusNode.textContent = '当前是本地文件模式，请改用云端公网地址访问';
            return;
          }

          statusNode.textContent = '云端访问配置未完整返回，请先检查部署配置';
        } catch (_error) {
          homeTextNode.textContent = '请查看 RUNBOOK.md 完成云端部署';
          healthTextNode.textContent = '请在部署完成后访问公网 /api/health';
          environmentTextNode.textContent = window.location.protocol === 'file:' ? 'file' : 'unknown';
          statusNode.textContent = '无法读取访问配置，请先检查云端服务';
        }
      }

      renderAccessInfo();
    </script>
  </body>
</html>
