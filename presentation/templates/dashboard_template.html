<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha Monitor Dashboard</title>
    <style>
      :root {
        --bg: #050507;
        --bg-soft: #0d0d11;
        --panel: rgba(16, 16, 20, 0.9);
        --panel-soft: rgba(23, 23, 30, 0.88);
        --panel-edge: rgba(255, 95, 106, 0.16);
        --panel-edge-strong: rgba(255, 95, 106, 0.3);
        --panel-shine: rgba(255, 255, 255, 0.06);
        --text: #f5f3f1;
        --text-soft: rgba(245, 243, 241, 0.76);
        --text-faint: rgba(245, 243, 241, 0.48);
        --accent: #a8142a;
        --accent-strong: #ff5566;
        --accent-soft: rgba(255, 85, 102, 0.14);
        --accent-deep: rgba(122, 16, 31, 0.34);
        --metal: #8e95a3;
        --good: #37d09a;
        --warn: #ffb85e;
        --bad: #ff7583;
        --today: rgba(255, 85, 102, 0.1);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --shadow-lg: 0 32px 80px rgba(0, 0, 0, 0.34);
        --shadow-md: 0 18px 42px rgba(0, 0, 0, 0.26);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Bahnschrift", "Microsoft YaHei UI", "PingFang SC", sans-serif;
        font-size: 15px;
        line-height: 1.5;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 0%, rgba(255, 85, 102, 0.1), transparent 28%),
          radial-gradient(circle at 88% 6%, rgba(168, 20, 42, 0.14), transparent 22%),
          linear-gradient(140deg, #040405 0%, #09090d 38%, #13080d 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        background-size: 36px 36px;
        mask-image: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.12));
      }

      a {
        color: inherit;
      }

      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        font: inherit;
      }

      .app-shell {
        width: calc(100vw - 16px);
        max-width: 1920px;
        margin: 0 auto;
        padding: 14px 0 24px;
      }

      .panel-surface {
        position: relative;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
          var(--panel);
        border: 1px solid var(--panel-edge);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        backdrop-filter: blur(18px);
      }

      .panel-surface::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.05),
          rgba(255, 85, 102, 0.18),
          rgba(255, 255, 255, 0.02)
        );
        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      .hero {
        overflow: hidden;
        padding: 24px 28px 18px;
        box-shadow: var(--shadow-lg);
        background:
          radial-gradient(circle at right top, rgba(255, 85, 102, 0.18), transparent 24%),
          linear-gradient(140deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0) 34%),
          linear-gradient(135deg, rgba(168, 20, 42, 0.26), rgba(13, 13, 17, 0.92) 52%, rgba(9, 9, 11, 0.98));
      }

      .hero-top {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: rgba(255, 226, 226, 0.74);
        font-size: 11px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(34px, 4vw, 54px);
        letter-spacing: 0.05em;
        line-height: 1;
      }

      .hero-status-row {
        position: relative;
        z-index: 1;
        display: flex;
        flex-wrap: wrap;
        gap: 10px 18px;
        align-items: center;
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .status-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        min-height: 18px;
        color: var(--text-soft);
        font-size: 14px;
      }

      .status-inline-item {
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }

      .status-inline-item strong {
        color: var(--text);
        font-weight: 700;
      }

      .status-separator {
        color: rgba(255, 255, 255, 0.2);
      }

      .status-inline-note {
        color: var(--text-faint);
        font-size: 13px;
      }

      .top-section {
        margin-top: 16px;
      }

      .subscription-panel,
      .module-shell {
        padding: 16px 18px;
      }

      .section-head,
      .module-toolbar,
      .premium-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 14px;
      }

      .section-head h2,
      .tab-title {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .section-note,
      .panel-meta,
      .slim-note {
        color: var(--text-soft);
        font-size: 13px;
        line-height: 1.65;
      }

      .panel-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
      }

      .subscription-table-wrap,
      .table-wrap {
        overflow-x: auto;
        overflow-y: visible;
        border-radius: var(--radius-md);
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.015)),
          rgba(255, 255, 255, 0.02);
      }

      .push-strip {
        display: grid;
        gap: 12px;
        margin-top: 14px;
        padding: 10px 8px 4px;
      }

      .push-strip-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .push-strip-title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .push-strip-note {
        color: var(--text-soft);
        font-size: 13px;
      }

      .push-form {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 12px;
      }

      .input-group {
        display: grid;
        gap: 6px;
      }

      .input-group label {
        color: var(--text-soft);
        font-size: 13px;
      }

      input[type="time"] {
        width: 100%;
        min-height: 44px;
        padding: 10px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: inherit;
      }

      .push-form .input-group {
        min-width: 148px;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .button-row.inline {
        margin-left: auto;
      }

      .btn-primary,
      .btn-secondary,
      .tab-button,
      .pagination-button,
      .sort-head {
        min-height: 44px;
        border-radius: var(--radius-sm);
        transition:
          transform 0.18s ease,
          background 0.18s ease,
          border-color 0.18s ease,
          box-shadow 0.18s ease,
          color 0.18s ease;
      }

      .btn-primary,
      .tab-button.active {
        color: #fff8f8;
        background: linear-gradient(135deg, #8f1226, #ff5566);
        box-shadow: 0 16px 30px rgba(168, 20, 42, 0.24);
      }

      .btn-primary,
      .btn-secondary,
      .tab-button,
      .pagination-button {
        padding: 11px 18px;
        font-size: 14px;
      }

      .btn-secondary,
      .tab-button,
      .pagination-button {
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .sort-head {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: auto;
        padding: 0;
        background: transparent;
        color: inherit;
      }

      .sort-head .sort-indicator {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-faint);
        font-size: 11px;
      }

      .sort-head.active {
        color: #ffe1e4;
      }

      .sort-head.active .sort-indicator {
        background: rgba(255, 85, 102, 0.16);
        color: #ffd6db;
      }

      .sort-head:hover,
      .btn-primary:hover,
      .btn-secondary:hover,
      .pagination-button:hover,
      .tab-button:hover {
        transform: translateY(-1px);
      }

      .btn-primary:disabled,
      .btn-secondary:disabled,
      .pagination-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }

      .tab-nav {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
        margin: 16px 0 14px;
      }

      .tab-button {
        width: 100%;
      }

      .tab-panel {
        display: none;
      }

      .tab-panel.active {
        display: block;
        animation: fadeUp 0.22s ease;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 14px;
      }

      .summary-grid.summary-grid-three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .summary-card,
      .list-card {
        padding: 14px 16px;
        border-radius: var(--radius-md);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.026), rgba(255, 255, 255, 0.01)),
          rgba(255, 255, 255, 0.018);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .summary-card {
        background:
          linear-gradient(180deg, rgba(255, 85, 102, 0.08), rgba(18, 18, 22, 0.92)),
          rgba(255, 255, 255, 0.02);
      }

      .summary-card.negative-card {
        background:
          linear-gradient(180deg, rgba(72, 100, 255, 0.08), rgba(18, 18, 22, 0.92)),
          rgba(255, 255, 255, 0.02);
      }

      .summary-card h3,
      .list-card h3 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      .summary-card.compact-card {
        padding: 12px 13px;
      }

      .summary-card.compact-card h3 {
        margin-bottom: 10px;
        font-size: 15px;
      }

      .stack-list {
        display: grid;
        gap: 10px;
      }

      .stack-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 9px 10px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
      }

      .compact-card .stack-list {
        gap: 8px;
      }

      .compact-card .stack-row {
        padding: 10px 12px;
      }

      .item-main {
        min-width: 0;
      }

      .item-title {
        font-size: 15px;
        font-weight: 700;
      }

      .item-subtitle {
        margin-top: 4px;
        color: var(--text-soft);
        font-size: 13px;
        line-height: 1.6;
      }

      .item-value {
        flex-shrink: 0;
        text-align: right;
        font-size: 14px;
        font-weight: 700;
      }

      .module-grid {
        display: grid;
        grid-template-columns: minmax(320px, 360px) minmax(0, 1fr);
        gap: 14px;
      }

      .formula-box {
        margin-bottom: 14px;
        padding: 16px 18px;
        border-radius: var(--radius-md);
        background:
          linear-gradient(180deg, rgba(168, 20, 42, 0.14), rgba(22, 15, 18, 0.88)),
          rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .formula-box h3 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .formula-lines {
        display: grid;
        gap: 8px;
      }

      .formula-line {
        color: var(--text-soft);
        font-size: 14px;
        line-height: 1.7;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      table[data-table-kind="subscription"] {
        min-width: 0;
      }

      table[data-table-kind="convertible"] {
        min-width: 0;
      }

      table[data-table-kind="premium"] {
        min-width: 0;
      }

      table[data-table-kind="monitor"] {
        min-width: 0;
      }

      table[data-table-kind="dividend"] {
        min-width: 0;
      }

      table[data-table-kind="merger"] {
        min-width: 0;
      }

      th,
      td {
        padding: 8px 8px;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        vertical-align: top;
        font-size: 12px;
        word-break: break-word;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: rgba(18, 18, 22, 0.98);
        color: var(--text-soft);
        font-weight: 600;
        white-space: nowrap;
      }

      tbody tr {
        transition: background 0.16s ease;
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.028);
      }

      .subscription-row.stage-subscribe {
        background: rgba(55, 208, 154, 0.06);
      }

      .subscription-row.stage-payment {
        background: rgba(255, 184, 94, 0.08);
      }

      .subscription-row.stage-listing {
        background: rgba(255, 117, 131, 0.08);
      }

      .merger-row-today {
        background:
          linear-gradient(90deg, rgba(255, 85, 102, 0.12), rgba(255, 85, 102, 0.02)),
          rgba(255, 255, 255, 0.014);
      }

      .stage-pill,
      .type-tag,
      .today-badge,
      .core-badge,
      .th-group-tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .type-tag,
      .core-badge {
        background: rgba(255, 255, 255, 0.08);
      }

      .today-badge {
        background: rgba(255, 85, 102, 0.18);
        color: #ffd6db;
      }

      .th-group-tag {
        margin-left: 6px;
        padding-inline: 8px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-faint);
      }

      .stage-pill.stage-subscribe {
        background: rgba(55, 208, 154, 0.18);
        color: #7af1be;
      }

      .stage-pill.stage-payment {
        background: rgba(255, 184, 94, 0.18);
        color: #ffd28f;
      }

      .stage-pill.stage-listing {
        background: rgba(255, 117, 131, 0.18);
        color: #ffadb6;
      }

      .mono-text {
        font-family: "Consolas", "SFMono-Regular", "Courier New", monospace;
      }

      .expand-button {
        min-height: 28px;
        padding: 5px 10px;
        font-size: 12px;
        border-radius: 10px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .expand-button:hover {
        background: rgba(255, 85, 102, 0.1);
      }

      .detail-row td {
        background: rgba(255, 255, 255, 0.02);
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px 12px;
      }

      .detail-item {
        min-width: 0;
      }

      .detail-label {
        color: var(--text-faint);
        font-size: 12px;
      }

      .detail-value {
        margin-top: 2px;
        color: var(--text);
        font-size: 13px;
        line-height: 1.45;
      }

      .muted {
        color: var(--text-soft);
      }

      .positive {
        color: var(--good);
      }

      .negative {
        color: var(--bad);
      }

      .loading-line {
        width: 100%;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 85, 102, 0.18),
          rgba(255, 255, 255, 0.04)
        );
        background-size: 200% 100%;
        animation: shimmer 1.2s linear infinite;
      }

      .loading-line.short {
        width: 58%;
      }

      .empty-state,
      .error-state,
      .loading-state {
        display: grid;
        gap: 8px;
        place-items: center;
        min-height: 180px;
        padding: 28px;
        text-align: center;
        color: var(--text-soft);
      }

      .pagination-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .pagination-status {
        color: var(--text-soft);
        font-size: 13px;
      }

      .pagination-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pagination-button.active {
        background: var(--accent-soft);
        color: #ffe7ea;
        border-color: rgba(255, 85, 102, 0.22);
      }

      .toast {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 60;
        min-width: 220px;
        max-width: 420px;
        padding: 14px 16px;
        border-radius: 16px;
        color: #fff;
        background: rgba(17, 17, 19, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: var(--shadow-lg);
        opacity: 0;
        transform: translateY(10px);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .toast.error {
        border-color: rgba(255, 117, 131, 0.32);
        background: rgba(67, 14, 20, 0.96);
      }

      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1380px) {
        .module-grid,
        .summary-grid.summary-grid-three {
          grid-template-columns: 1fr;
        }

        .tab-nav {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .button-row.inline {
          margin-left: 0;
        }
      }

      @media (max-width: 860px) {
        .app-shell {
          width: calc(100vw - 18px);
          padding-top: 12px;
        }

        .hero,
        .subscription-panel,
        .module-shell {
          padding: 16px;
        }

        .hero-top,
        .section-head,
        .module-toolbar,
        .premium-toolbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .summary-grid,
        .module-grid {
          grid-template-columns: 1fr;
        }

        .tab-nav {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
        }

        .button-row .btn-primary,
        .button-row .btn-secondary {
          flex: 1 1 100%;
        }

        .push-form {
          align-items: stretch;
        }

        .push-form .input-group {
          min-width: 100%;
        }

        .pagination-bar {
          align-items: flex-start;
        }

        .pagination-buttons {
          width: 100%;
        }

        .pagination-button {
          flex: 1 1 calc(50% - 6px);
        }

        .detail-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero panel-surface">
        <div class="hero-top">
          <div>
            <p class="eyebrow">Alpha Monitor / Live Dashboard</p>
            <h1>Alpha Monitor</h1>
          </div>
        </div>
        <div class="hero-status-row">
          <div id="status-line" class="status-inline"></div>
          <div id="status-update-text" class="status-inline-note">正在连接市场接口</div>
        </div>
      </header>

      <section class="top-section">
        <section class="panel-surface subscription-panel">
          <div class="section-head">
            <h2>股债打新</h2>
            <div id="last-refresh-text" class="section-note">等待数据返回</div>
          </div>
          <div id="subscription-summary" class="subscription-table-wrap"></div>
        </section>

      </section>

      <nav id="tab-nav" class="tab-nav" aria-label="主功能切换">
        <button class="tab-button active" data-tab="cb-arb" type="button">转债套利</button>
        <button class="tab-button" data-tab="ah" type="button">AH溢价</button>
        <button class="tab-button" data-tab="ab" type="button">AB溢价</button>
        <button class="tab-button" data-tab="monitor" type="button">监控套利</button>
        <button class="tab-button" data-tab="dividend" type="button">分红提醒</button>
        <button class="tab-button" data-tab="merger" type="button">收购私有</button>
      </nav>

      <section id="tab-panels">
        <section id="panel-cb-arb" class="panel-surface tab-panel active"></section>
        <section id="panel-ah" class="panel-surface tab-panel"></section>
        <section id="panel-ab" class="panel-surface tab-panel"></section>
        <section id="panel-monitor" class="panel-surface tab-panel"></section>
        <section id="panel-dividend" class="panel-surface tab-panel"></section>
