<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha Monitor Dashboard</title>
    <style>
      :root {
        --bg: #050507;
        --bg-soft: #0d0d11;
        --panel: rgba(16, 16, 20, 0.9);
        --panel-soft: rgba(23, 23, 30, 0.88);
        --panel-edge: rgba(255, 95, 106, 0.16);
        --panel-edge-strong: rgba(255, 95, 106, 0.3);
        --panel-shine: rgba(255, 255, 255, 0.06);
        --text: #f5f3f1;
        --text-soft: rgba(245, 243, 241, 0.76);
        --text-faint: rgba(245, 243, 241, 0.48);
        --accent: #a8142a;
        --accent-strong: #ff5566;
        --accent-soft: rgba(255, 85, 102, 0.14);
        --accent-deep: rgba(122, 16, 31, 0.34);
        --metal: #8e95a3;
        --good: #37d09a;
        --warn: #ffb85e;
        --bad: #ff7583;
        --today: rgba(255, 85, 102, 0.1);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --shadow-lg: 0 32px 80px rgba(0, 0, 0, 0.34);
        --shadow-md: 0 18px 42px rgba(0, 0, 0, 0.26);
        --table-font-size-desktop: 14px;
        --table-header-font-size-desktop: 14px;
        --table-line-height-desktop: 1.58;
        --table-cell-padding-y-desktop: 10px;
        --table-cell-padding-x-desktop: 12px;
        --table-font-size-tablet: 13px;
        --table-min-width-subscription: 1180px;
        --table-min-width-convertible: 1560px;
        --table-min-width-premium: 1240px;
        --table-min-width-monitor: 1320px;
        --table-min-width-dividend: 1100px;
        --table-min-width-merger: 1280px;
        --table-min-width-lof: 1680px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Bahnschrift", "Microsoft YaHei UI", "PingFang SC", sans-serif;
        font-size: 15px;
        line-height: 1.5;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 0%, rgba(255, 85, 102, 0.1), transparent 28%),
          radial-gradient(circle at 88% 6%, rgba(168, 20, 42, 0.14), transparent 22%),
          linear-gradient(140deg, #040405 0%, #09090d 38%, #13080d 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        background-size: 36px 36px;
        mask-image: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.12));
      }

      a {
        color: inherit;
      }

      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        font: inherit;
      }

      .app-shell {
        /* 核心布局：尽量接近满屏，减少无意义外边距 */
        width: calc(100vw - 12px);
        max-width: 1980px;
        margin: 0 auto;
        padding: 10px 0 18px;
      }

      .panel-surface {
        position: relative;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
          var(--panel);
        border: 1px solid var(--panel-edge);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        backdrop-filter: blur(18px);
      }

      .panel-surface::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.05),
          rgba(255, 85, 102, 0.18),
          rgba(255, 255, 255, 0.02)
        );
        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      .hero {
        overflow: hidden;
        /* 首屏压缩：减少标题区高度，让主表更早进入视野 */
        padding: 12px 16px 8px;
        box-shadow: var(--shadow-lg);
        background:
          radial-gradient(circle at right top, rgba(255, 85, 102, 0.18), transparent 24%),
          linear-gradient(140deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0) 34%),
          linear-gradient(135deg, rgba(168, 20, 42, 0.26), rgba(13, 13, 17, 0.92) 52%, rgba(9, 9, 11, 0.98));
      }

      .hero-top {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: rgba(255, 226, 226, 0.74);
        font-size: 9px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(24px, 2.8vw, 34px);
        letter-spacing: 0.03em;
        line-height: 1;
      }

      .hero-status-row {
        position: relative;
        z-index: 1;
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        align-items: center;
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .status-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 4px 10px;
        min-height: 18px;
        color: rgba(245, 243, 241, 0.86);
        font-size: 13px;
      }

      .status-inline-item {
        display: inline-flex;
        gap: 5px;
        align-items: center;
        padding: 0;
      }

      .status-inline-item strong {
        color: var(--text);
        font-weight: 700;
      }

      .status-separator {
        color: rgba(255, 255, 255, 0.2);
      }

      .status-inline-note {
        color: rgba(245, 243, 241, 0.62);
        font-size: 12px;
      }

      .top-section {
        margin-top: 8px;
      }

      .subscription-panel,
      .module-shell {
        /* 统一模块密度，避免卡片壳层过厚 */
        padding: 10px 12px;
      }

      .section-head,
      .module-toolbar,
      .premium-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 8px;
      }

      .section-head > :first-child,
      .module-toolbar > :first-child,
      .premium-toolbar > :first-child {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .section-head h2,
      .tab-title {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
      }

      .section-note,
      .panel-meta,
      .slim-note {
        color: rgba(245, 243, 241, 0.72);
        font-size: calc(var(--table-font-size-desktop) - 1px);
        line-height: 1.32;
      }

      .panel-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 8px;
      }

      .panel-meta span {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 7px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.025);
      }

      .subscription-table-wrap,
      .table-wrap {
        overflow-x: auto;
        overflow-y: visible;
        border-radius: var(--radius-md);
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.015)),
          rgba(255, 255, 255, 0.02);
      }

      .push-strip {
        display: grid;
        gap: 8px;
        margin-top: 10px;
        padding: 6px 0 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .push-strip-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .push-strip-status {
        display: grid;
        gap: 4px;
        justify-items: end;
        min-width: 0;
      }

      .push-strip-title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
      }

      .push-strip-note {
        color: var(--text-soft);
        font-size: 12px;
        max-width: 620px;
        text-align: right;
      }

      .push-form {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 10px;
      }

      .input-group {
        display: grid;
        gap: 4px;
      }

      .input-group label {
        color: var(--text-soft);
        font-size: 12px;
      }

      input[type="time"],
      input[type="text"],
      input[type="number"],
      select,
      textarea {
        width: 100%;
        min-height: 36px;
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: inherit;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      .push-form .input-group {
        min-width: 136px;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .button-row.inline {
        margin-left: auto;
      }

      .btn-primary,
      .btn-secondary,
      .tab-button,
      .pagination-button,
      .sort-head {
        min-height: 38px;
        border-radius: var(--radius-sm);
        transition:
          transform 0.18s ease,
          background 0.18s ease,
          border-color 0.18s ease,
          box-shadow 0.18s ease,
          color 0.18s ease;
      }

      .btn-primary,
      .tab-button.active {
        color: #fff8f8;
        background: linear-gradient(135deg, #8f1226, #ff5566);
        box-shadow: 0 16px 30px rgba(168, 20, 42, 0.24);
      }

      .btn-primary,
      .btn-secondary,
      .tab-button,
      .pagination-button {
        padding: 7px 12px;
        font-size: 13px;
      }

      .btn-secondary,
      .tab-button,
      .pagination-button {
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .sort-head {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: auto;
        padding: 0;
        background: transparent;
        color: inherit;
      }

      .sort-head .sort-indicator {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-faint);
        font-size: 11px;
      }

      .sort-head.active {
        color: #ffe1e4;
      }

      .sort-head.active .sort-indicator {
        background: rgba(255, 85, 102, 0.16);
        color: #ffd6db;
      }

      .sort-head:hover,
      .btn-primary:hover,
      .btn-secondary:hover,
      .pagination-button:hover,
      .tab-button:hover {
        transform: translateY(-1px);
      }

      .btn-primary:disabled,
      .btn-secondary:disabled,
      .pagination-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }

      .tab-nav {
        /* 主导航压缩为更像信息切换条，而不是大卡片按钮组 */
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 6px;
        margin: 8px 0 6px;
      }

      .tab-button {
        width: 100%;
        position: relative;
        overflow: hidden;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.025);
      }

      .tab-button::after {
        content: "";
        position: absolute;
        inset: auto 10px 0;
        height: 2px;
        border-radius: 999px;
        background: transparent;
        transition: background 0.18s ease;
      }

      .tab-button.active::after {
        background: rgba(255, 248, 248, 0.8);
      }

      .tab-panel {
        display: none;
      }

      .tab-panel.active {
        display: block;
        animation: fadeUp 0.22s ease;
      }

      .subtab-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .subtab-button {
        min-height: 34px;
        padding: 7px 12px;
        border-radius: 999px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 13px;
      }

      .subtab-button.active {
        color: #fff8f8;
        background: linear-gradient(135deg, #8f1226, #ff5566);
        box-shadow: 0 12px 24px rgba(168, 20, 42, 0.18);
      }

      .subtab-button.disabled {
        opacity: 0.72;
      }

      .disabled-card {
        border-style: dashed;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        margin-bottom: 6px;
      }

      .summary-grid.summary-grid-three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .summary-card,
      .list-card {
        padding: 9px 10px;
        border-radius: var(--radius-md);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.026), rgba(255, 255, 255, 0.01)),
          rgba(255, 255, 255, 0.018);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .summary-card {
        background:
          linear-gradient(180deg, rgba(255, 85, 102, 0.08), rgba(18, 18, 22, 0.92)),
          rgba(255, 255, 255, 0.02);
      }

      .summary-card.negative-card {
        background:
          linear-gradient(180deg, rgba(72, 100, 255, 0.08), rgba(18, 18, 22, 0.92)),
          rgba(255, 255, 255, 0.02);
      }

      .summary-card h3,
      .list-card h3 {
        margin: 0 0 4px;
        font-size: 13px;
      }

      .summary-card .stack-row {
        align-items: center;
        border: 1px solid rgba(255, 255, 255, 0.05);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.022), rgba(255, 255, 255, 0)),
          rgba(255, 255, 255, 0.026);
      }

      .summary-card .item-value {
        font-size: 15px;
      }

      .negative-card .item-value {
        color: #d6e3ff;
      }

      .card-stack + .card-stack {
        margin-top: 8px;
      }

      .summary-card.compact-card {
        padding: 7px 8px;
      }

      .summary-card.compact-card h3 {
        margin-bottom: 4px;
        font-size: 13px;
      }

      .monitor-editor-card {
        margin-bottom: 10px;
      }

      .monitor-editor-inline {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 85, 102, 0.18);
        background:
          linear-gradient(180deg, rgba(255, 85, 102, 0.08), rgba(20, 16, 19, 0.92)),
          rgba(255, 255, 255, 0.02);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
      }

      .monitor-editor-head,
      .monitor-item-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px 14px;
        flex-wrap: wrap;
      }

      .monitor-editor-form {
        display: grid;
        gap: 10px;
      }

      .monitor-form-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px 10px;
      }

      .monitor-form-grid.monitor-form-grid-simple {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .monitor-form-note {
        grid-column: 1 / -1;
      }

      .monitor-lookup-zone {
        display: grid;
        gap: 6px;
        margin-top: 6px;
        min-height: 22px;
      }

      .monitor-lookup-hint {
        padding: 7px 9px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-soft);
        font-size: 12px;
        line-height: 1.4;
      }

      .monitor-lookup-resolved {
        border-color: rgba(55, 208, 154, 0.22);
        background: rgba(55, 208, 154, 0.08);
        color: #aef3d5;
      }

      .monitor-lookup-error {
        border-color: rgba(255, 117, 131, 0.24);
        background: rgba(103, 23, 32, 0.3);
        color: #ffc0c8;
      }

      .monitor-lookup-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .monitor-lookup-chip {
        min-height: 30px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        font-size: 12px;
      }

      .monitor-lookup-chip:hover {
        border-color: rgba(255, 85, 102, 0.24);
        background: rgba(255, 85, 102, 0.12);
      }

      .monitor-item-actions {
        display: inline-flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .mini-action {
        min-height: 28px;
        padding: 4px 9px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-soft);
      }

      .mini-action:hover {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .mini-action.danger {
        border-color: rgba(255, 117, 131, 0.22);
        color: #ffb8c1;
      }

      .meta-chip {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 11px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-soft);
        font-size: 12px;
      }

      .formula-box.formula-box-compact {
        margin-bottom: 10px;
      }

      .stack-list {
        display: grid;
        gap: 6px;
      }

      .stack-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 5px 8px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
      }

      .compact-card .stack-list {
        gap: 6px;
      }

      .compact-card .stack-row {
        padding: 7px 9px;
      }

      .item-main {
        min-width: 0;
      }

      .item-title {
        font-size: 14px;
        font-weight: 700;
        line-height: 1.32;
      }

      .item-subtitle {
        margin-left: 5px;
        color: var(--text-soft);
        font-size: 12px;
        line-height: 1.35;
        font-weight: 400;
      }

      .item-value {
        flex-shrink: 0;
        text-align: right;
        font-size: 14px;
        font-weight: 700;
      }

      .module-grid {
        display: grid;
        grid-template-columns: minmax(320px, 360px) minmax(0, 1fr);
        gap: 14px;
      }

      .formula-box {
        margin-bottom: 10px;
        padding: 12px 13px;
        border-radius: var(--radius-md);
        background:
          linear-gradient(180deg, rgba(168, 20, 42, 0.14), rgba(22, 15, 18, 0.88)),
          rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .formula-box h3 {
        margin: 0 0 8px;
        font-size: 15px;
      }

      .formula-lines {
        display: grid;
        gap: 6px;
      }

      .formula-line {
        color: var(--text-soft);
        font-size: 13px;
        line-height: 1.5;
      }

      table {
        /* 让列宽优先跟随内容，横向滚动用于承载更多真实字段 */
        width: max-content;
        min-width: 100%;
        border-collapse: collapse;
        /* 表格以数据可读性优先，避免 fixed 布局导致无意义折行 */
        table-layout: auto;
      }

      table[data-table-kind="subscription"] {
        min-width: var(--table-min-width-subscription);
      }

      table[data-table-kind="convertible"] {
        min-width: var(--table-min-width-convertible);
      }

      table[data-table-kind="premium"] {
        min-width: var(--table-min-width-premium);
      }

      table[data-table-kind="monitor"] {
        min-width: var(--table-min-width-monitor);
      }

      table[data-table-kind="dividend"] {
        min-width: var(--table-min-width-dividend);
      }

      table[data-table-kind="merger"] {
        min-width: var(--table-min-width-merger);
      }

      table[data-table-kind="lof"] {
        min-width: var(--table-min-width-lof);
      }

      th,
      td {
        padding: var(--table-cell-padding-y-desktop) var(--table-cell-padding-x-desktop);
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        vertical-align: top;
        font-size: var(--table-font-size-desktop);
        line-height: var(--table-line-height-desktop);
        white-space: nowrap;
        word-break: normal;
        overflow-wrap: normal;
        font-variant-numeric: tabular-nums;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: rgba(18, 18, 22, 0.98);
        color: var(--text-soft);
        font-weight: 600;
        font-size: var(--table-header-font-size-desktop);
        line-height: 1.45;
        white-space: nowrap;
      }

      tbody tr {
        transition: background 0.16s ease;
      }

      tbody tr:not(.detail-row):not(.subscription-row):not(.merger-row-today):nth-child(even) {
        background: rgba(255, 255, 255, 0.018);
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.028);
      }

      .subscription-row.stage-subscribe {
        background: rgba(55, 208, 154, 0.06);
      }

      .subscription-row.stage-payment {
        background: rgba(255, 184, 94, 0.08);
      }

      .subscription-row.stage-listing {
        background: rgba(255, 117, 131, 0.08);
      }

      .merger-row-today {
        background:
          linear-gradient(90deg, rgba(255, 85, 102, 0.12), rgba(255, 85, 102, 0.02)),
          rgba(255, 255, 255, 0.014);
      }

      .stage-pill,
      .type-tag,
      .today-badge,
      .core-badge,
      .th-group-tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 3px 8px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .type-tag,
      .core-badge {
        background: rgba(255, 255, 255, 0.08);
      }

      .today-badge {
        background: rgba(255, 85, 102, 0.18);
        color: #ffd6db;
      }

      .th-group-tag {
        margin-left: 6px;
        padding-inline: 8px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-faint);
      }

      .stage-pill.stage-subscribe {
        background: rgba(55, 208, 154, 0.18);
        color: #7af1be;
      }

      .stage-pill.stage-payment {
        background: rgba(255, 184, 94, 0.18);
        color: #ffd28f;
      }

      .stage-pill.stage-listing {
        background: rgba(255, 117, 131, 0.18);
        color: #ffadb6;
      }

      .mono-text {
        font-family: "Consolas", "SFMono-Regular", "Courier New", monospace;
      }

      .cell-inline {
        display: inline-flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 2px 6px;
        min-width: 0;
      }

      .cell-inline.tight {
        gap: 2px 6px;
      }

      .cell-code {
        color: var(--text-soft);
      }

      .cell-muted {
        color: var(--text-soft);
      }

      .cell-divider {
        color: rgba(255, 255, 255, 0.28);
      }

      .expand-button {
        min-height: 28px;
        padding: 5px 10px;
        font-size: calc(var(--table-font-size-desktop) - 1px);
        border-radius: 10px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-variant-numeric: tabular-nums;
      }

      .expand-button:hover {
        background: rgba(255, 85, 102, 0.1);
      }

      .detail-row td {
        background: rgba(255, 255, 255, 0.02);
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px 12px;
      }

      .detail-grid.single-column {
        grid-template-columns: minmax(0, 1fr);
      }

      .detail-item {
        min-width: 0;
      }

      .detail-item.full-span {
        grid-column: 1 / -1;
      }

      .detail-label {
        color: var(--text-faint);
        font-size: calc(var(--table-font-size-desktop) - 1px);
      }

      .detail-value {
        margin-top: 2px;
        color: var(--text);
        font-size: var(--table-font-size-desktop);
        line-height: var(--table-line-height-desktop);
        white-space: normal;
        word-break: break-word;
        font-variant-numeric: tabular-nums;
      }

      .muted {
        color: var(--text-soft);
      }

      .detail-note {
        margin-top: 8px;
      }

      .today-badge-row {
        margin-top: 4px;
      }

      .positive {
        color: var(--good);
      }

      .negative {
        color: var(--bad);
      }

      .loading-line {
        width: 100%;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 85, 102, 0.18),
          rgba(255, 255, 255, 0.04)
        );
        background-size: 200% 100%;
        animation: shimmer 1.2s linear infinite;
      }

      .loading-line.short {
        width: 58%;
      }

      .empty-state,
      .error-state,
      .loading-state {
        display: grid;
        gap: 8px;
        place-items: center;
        min-height: 92px;
        padding: 14px;
        text-align: center;
        color: var(--text-soft);
      }

      .pagination-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .pagination-status {
        color: var(--text-soft);
        font-size: calc(var(--table-font-size-desktop) - 1px);
        line-height: 1.5;
        font-variant-numeric: tabular-nums;
      }

      .pagination-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .pagination-button.active {
        background: var(--accent-soft);
        color: #ffe7ea;
        border-color: rgba(255, 85, 102, 0.22);
      }

      .toast {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 60;
        min-width: 220px;
        max-width: 420px;
        padding: 14px 16px;
        border-radius: 16px;
        color: #fff;
        background: rgba(17, 17, 19, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: var(--shadow-lg);
        opacity: 0;
        transform: translateY(10px);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .toast.error {
        border-color: rgba(255, 117, 131, 0.32);
        background: rgba(67, 14, 20, 0.96);
      }

      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1379px) and (min-width: 861px) {
        th,
        td {
          font-size: var(--table-font-size-tablet);
          padding:
            calc(var(--table-cell-padding-y-desktop) - 1px)
            calc(var(--table-cell-padding-x-desktop) - 2px);
        }

        th {
          font-size: var(--table-font-size-tablet);
        }

        .section-note,
        .panel-meta,
        .slim-note,
        .detail-label,
        .pagination-status,
        .expand-button {
          font-size: calc(var(--table-font-size-tablet) - 1px);
        }

        .detail-value {
          font-size: var(--table-font-size-tablet);
        }
      }

      @media (max-width: 1380px) {
        .module-grid,
        .summary-grid.summary-grid-three {
          grid-template-columns: 1fr;
        }

        .tab-nav {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .monitor-form-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .monitor-form-grid.monitor-form-grid-simple {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .button-row.inline {
          margin-left: 0;
        }
      }

      @media (max-width: 860px) {
        .app-shell {
          width: calc(100vw - 18px);
          padding-top: 10px;
        }

        .hero,
        .subscription-panel,
        .module-shell {
          padding: 14px;
        }

        .hero-top,
        .section-head,
        .module-toolbar,
        .premium-toolbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .summary-grid,
        .module-grid {
          grid-template-columns: 1fr;
        }

        .tab-nav {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 8px;
        }

        .button-row .btn-primary,
        .button-row .btn-secondary {
          flex: 1 1 100%;
        }

        .push-form {
          align-items: stretch;
        }

        .push-form .input-group {
          min-width: 100%;
        }

        .monitor-form-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .monitor-form-grid.monitor-form-grid-simple {
          grid-template-columns: 1fr;
        }

        .pagination-bar {
          align-items: flex-start;
        }

        .pagination-buttons {
          width: 100%;
        }

        .pagination-button {
          flex: 1 1 calc(50% - 6px);
        }

        .detail-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        th,
        td {
          font-size: calc(var(--table-font-size-tablet) - 0.5px);
          padding: 8px 9px;
        }

        th {
          font-size: var(--table-font-size-tablet);
        }

        .section-note,
        .panel-meta,
        .slim-note,
        .detail-label,
        .pagination-status,
        .expand-button {
          font-size: calc(var(--table-font-size-tablet) - 1px);
        }

        .detail-value {
          font-size: var(--table-font-size-tablet);
          line-height: 1.55;
        }
      }

      @media (max-width: 560px) {
        .monitor-form-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero panel-surface">
        <div class="hero-top">
          <div>
            <p class="eyebrow">Alpha Monitor / Live Dashboard</p>
            <h1>Alpha Monitor</h1>
          </div>
        </div>
        <div class="hero-status-row">
          <div id="status-line" class="status-inline"></div>
          <div id="status-update-text" class="status-inline-note">正在连接市场接口</div>
        </div>
      </header>

      <section class="top-section">
        <section class="panel-surface subscription-panel">
          <div class="section-head">
            <h2>股债打新</h2>
            <div id="last-refresh-text" class="section-note">等待数据返回</div>
          </div>
          <div id="subscription-summary" class="subscription-table-wrap"></div>
        </section>

      </section>

      <nav id="tab-nav" class="tab-nav" aria-label="主功能切换">
        <button class="tab-button active" data-tab="cb-arb" type="button">转债套利</button>
        <button class="tab-button" data-tab="ah" type="button">AH溢价</button>
        <button class="tab-button" data-tab="ab" type="button">AB溢价</button>
        <button class="tab-button" data-tab="monitor" type="button">监控套利</button>
        <button class="tab-button" data-tab="dividend" type="button">分红提醒</button>
        <button class="tab-button" data-tab="merger" type="button">事件套利</button>
      </nav>

      <section id="tab-panels">
        <section id="panel-cb-arb" class="panel-surface tab-panel active"></section>
        <section id="panel-ah" class="panel-surface tab-panel"></section>
        <section id="panel-ab" class="panel-surface tab-panel"></section>
        <section id="panel-monitor" class="panel-surface tab-panel"></section>
        <section id="panel-dividend" class="panel-surface tab-panel"></section>
        <section id="panel-merger" class="panel-surface tab-panel"></section>
      </section>

      <section class="push-strip" aria-label="推送设置">
        <div class="push-strip-head">
          <h2 class="push-strip-title">推送设置</h2>
          <div class="push-strip-status">
            <div id="push-state-text" class="push-strip-note">正在读取定时推送状态</div>
            <div id="push-alert-state-text" class="push-strip-note">正在读取异动推送状态</div>
          </div>
        </div>
        <form id="push-form" class="push-form">
          <div class="input-group">
            <label for="push-time-1">定时推送 1</label>
            <input id="push-time-1" type="time" />
          </div>
          <div class="input-group">
            <label for="push-time-2">定时推送 2</label>
            <input id="push-time-2" type="time" />
          </div>
          <div class="input-group">
            <label for="push-alert-cooldown">异动冷却(分钟)</label>
            <input id="push-alert-cooldown" type="number" min="1" max="1440" step="1" />
          </div>
          <div class="button-row inline">
            <button id="save-push-button" type="submit" class="btn-primary">保存</button>
            <button id="reload-data-button" type="button" class="btn-secondary">刷新</button>
          </div>
        </form>
      </section>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/presentation/dashboard/dashboard_page.js?v=20260324-release-visibility-1"></script>
  </body>
</html>
